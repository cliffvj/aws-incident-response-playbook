name: Automation validation
on:
  pull_request:
    paths: ["automation/**", ".github/workflows/automation-validation.yml"]
  push:
    branches: [main]
    paths: ["automation/**", ".github/workflows/automation-validation.yml"]
permissions:
  contents: read
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: python -m pip install -r automation/requirements-dev.txt
      - run: python -m unittest discover -s automation/tests -p 'test_*.py'
      - run: python automation/scripts/validate_json.py
      - run: python automation/scripts/package_lambdas.py
  terraform:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: automation/terraform } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
